<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeka</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { height: calc(100vh - 86px); width: 100%; margin-top: 48px; }

.topnav {
    background-color: #333;
    overflow: visible;
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 48px;
}
.topnav-title { color: #f2f2f2; font-size: 17px; text-decoration: none; }
.topnav-hamburger {
    background: none; border: none; color: #f2f2f2;
    font-size: 22px; cursor: pointer; padding: 6px; line-height: 1;
}

#nav-drawer {
    display: none;
    position: fixed; top: 48px; left: 0; right: 0;
    background: #333; z-index: 1500;
    border-top: 1px solid #444;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
}
.acc-heading {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px; color: #d67214; font-size: 13px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    border-top: 0.5px solid #444; cursor: pointer; user-select: none;
}
.acc-heading .chevron { font-size: 12px; transition: transform 0.2s ease; color: #888; }
.acc-heading.open .chevron { transform: rotate(180deg); }
.acc-body { display: none; }
.acc-body.open { display: block; }
.acc-item {
    display: block; padding: 12px 16px 12px 28px;
    color: #f2f2f2; font-size: 15px; text-decoration: none;
    border-top: 0.5px solid #3e3e3e; cursor: pointer;
}
.acc-item:hover { background: #3e3e3e; }

.layer-panel {
    display: none; position: fixed; bottom: 90px; right: 10px;
    background: white; border: 1px solid #ddd; border-radius: 12px;
    padding: 12px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.layer-panel-title { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 8px; }
.layer-btn {
    background: white; border: 1px solid #ddd; border-radius: 8px;
    padding: 6px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; width: 52px;
}
.layer-btn span { color: #555; font-size: 9px; }
.layer-btn.active { background: #ffe0b2; border-color: #d67214; }

/* ── Add Pin button (bottom left) ── */
#add-pin-btn {
    position: fixed; bottom: 55px; left: 10px;
    background: #d67214; border: none; border-radius: 50%;
    width: 48px; height: 48px; z-index: 1001;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer; font-size: 26px; color: white;
    display: flex; align-items: center; justify-content: center;
}

/* ── Add Pin chooser panel ── */
#add-pin-chooser {
    display: none; position: fixed; bottom: 112px; left: 10px;
    background: white; border: 1px solid #ddd; border-radius: 12px;
    padding: 10px; z-index: 1001; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    min-width: 180px;
}
#add-pin-chooser button {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px; margin-bottom: 4px;
    background: #f7f7f7; border: 1px solid #eee; border-radius: 8px;
    font-size: 14px; font-family: inherit; cursor: pointer; color: #1a1a1a;
    text-align: left;
}
#add-pin-chooser button:last-child { margin-bottom: 0; }
#add-pin-chooser button:hover { background: #ffe0b2; border-color: #d67214; }
#address-search-row {
    display: none; margin-top: 6px;
}
#address-search-row input {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1.5px solid #e8e8e8; font-size: 14px;
    font-family: inherit; box-sizing: border-box; outline: none;
}
#address-search-row input:focus { border-color: #d67214; }
#address-results {
    margin-top: 4px; max-height: 160px; overflow-y: auto;
}
#address-results div {
    padding: 8px 10px; font-size: 13px; cursor: pointer;
    border-bottom: 0.5px solid #eee; color: #333;
}
#address-results div:hover { background: #f0f0f0; }

#pin-form {
    display: none; position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); background: #ffffff; border-radius: 20px;
    padding: 20px 18px 18px; width: 320px; max-width: calc(100vw - 24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10); z-index: 1002;
}
#pin-form h3 { margin: 0 0 16px; font-size: 16px; font-weight: 700; color: #1a1a1a; }
#pin-form select, #pin-form input[type="text"], #pin-form input[type="url"],
#pin-form input[type="tel"], #pin-form textarea {
    width: 100%; margin-bottom: 10px; padding: 11px 13px; border-radius: 11px;
    border: 1.5px solid #e8e8e8; font-size: 14px; font-family: inherit; color: #1a1a1a;
    background: #f7f7f7; box-sizing: border-box; outline: none;
    -webkit-appearance: none; appearance: none;
}
#pin-form select:focus, #pin-form input[type="text"]:focus,
#pin-form input[type="url"]:focus, #pin-form textarea:focus {
    border-color: #2d8a4e; background: #ffffff;
}
#pin-form textarea { height: 70px; resize: none; line-height: 1.4; }
#pin-form input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 13px; color: #555; box-sizing: border-box; }
.form-buttons { display: flex; gap: 10px; margin-top: 4px; }
.form-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; }
#save-btn { background: rgba(214, 114, 20, 0.75); color: white; }
#cancel-btn { background: #f0f0f0; color: #444; }
</style>
</head>
<body>

<div class="topnav" id="myTopnav">
    <a href="index.html" class="topnav-title">Home</a>
    <button class="topnav-hamburger" onclick="toggleDrawer()" aria-label="Menu">
        <i class="fa fa-bars"></i>
    </button>
</div>

<div id="nav-drawer">
    <div class="acc-section">
        <div class="acc-heading" onclick="toggleSection(this)">Parks <span class="chevron">▼</span></div>
        <div class="acc-body">
            <a class="acc-item" href="https://parks.dpaw.wa.gov.au/" target="_blank" onclick="closeDrawer()">Explore Parks</a>
            <a class="acc-item" href="https://parkstay.dpaw.wa.gov.au/" target="_blank" onclick="closeDrawer()">Park Stay</a>
        </div>
    </div>
    <div class="acc-section">
        <div class="acc-heading" onclick="toggleSection(this)">Nature <span class="chevron">▼</span></div>
        <div class="acc-body">
            <a class="acc-item" onclick="openNature('birds')">Birds</a>
            <a class="acc-item" onclick="openNature('fish')">Fish</a>
            <a class="acc-item" onclick="openNature('plants')">Plants</a>
        </div>
    </div>
    <div class="acc-section">
        <div class="acc-heading" onclick="toggleSection(this)">Weather <span class="chevron">▼</span></div>
        <div class="acc-body">
            <a class="acc-item" href="https://www.bom.gov.au/wa/" target="_blank" onclick="closeDrawer()">BOM</a>
            <a class="acc-item" href="https://zoom.earth/maps/satellite/#view=-27.71,132.96,5z/overlays=radar" target="_blank" onclick="closeDrawer()">Zoom Earth</a>
            <a class="acc-item" href="https://www.emergency.wa.gov.au/" target="_blank" onclick="closeDrawer()">DFES</a>
        </div>
    </div>
    <div class="acc-section">
        <div class="acc-heading" onclick="toggleSection(this)">Styles <span class="chevron">▼</span></div>
        <div class="acc-body">
            <a class="acc-item" onclick="setMapLayer(stadiaOutdoors);closeDrawer()">Topo</a>
            <a class="acc-item" onclick="setMapLayer(stadiaSatellite);closeDrawer()">Satellite</a>
            <a class="acc-item" onclick="setMapLayer(stadiaDark);closeDrawer()">Dark</a>
            <a class="acc-item" onclick="setMapLayer(osmLayer);closeDrawer()">Map (OSM)</a>
        </div>
    </div>
</div>

<div id="map"></div>

<!-- Add Pin button (bottom left) -->
<button id="add-pin-btn" onclick="toggleAddPinChooser()" aria-label="Add Pin">+</button>

<!-- Add Pin chooser panel -->
<div id="add-pin-chooser">
    <button onclick="addPinFromGPS()"><img src="icons/addcurrentlocation.png" style="width:28px;height:28px;">Current GPS</button>
    <button onclick="toggleAddressSearch()"> <img src="icons/addaddress.png" style="width:28px;height:28px;">Search Address</button>
    <button onclick="addPinFromMap()"><img src="icons/addtapmap.png" style="width:28px;height:28px;">Tap Map</button>
    <div id="address-search-row">
        <input type="text" id="address-input" placeholder="Search address or place...">
        <div id="address-results"></div>
    </div>
</div>

<!-- Explore panel -->
<div id="explore-panel" class="layer-panel">
    <div class="layer-panel-title">EXPLORE</div>
    <div style="display:flex;gap:8px;">
        <button id="btn-lighthouses" class="layer-btn" onclick="toggleLighthouses()">
            <img src="icons/lighthouse.png" style="width:28px;height:28px;"><span>Lights</span>
        </button>
        <button id="btn-walk" class="layer-btn" onclick="toggleTrailLayer('walk')">
            <img src="icons/trail.png" style="width:28px;height:28px;"><span>Walk</span>
        </button>
        <button id="btn-paddle" class="layer-btn" onclick="toggleTrailLayer('paddle')">
            <img src="icons/paddle.png" style="width:28px;height:28px;"><span>Paddle</span>
        </button>
        <button id="btn-2x2" class="layer-btn" onclick="toggle2x2()">
            <img src="icons/2x2.png" style="width:28px;height:28px;"><span>2x2</span>
        </button>
        <button id="btn-aboriginal" class="layer-btn" onclick="toggleAboriginal()">
            <img src="icons/aboriginal.png" style="width:28px;height:28px;"><span>Country</span>
        </button>
        <button id="btn-caves" class="layer-btn" onclick="toggleCaves()">
            <img src="icons/caves.png" style="width:28px;height:28px;"><span>Caves</span>
        </button>
        <button id="btn-fossils" class="layer-btn" onclick="toggleFossils()">
            <img src="icons/fossil.png" style="width:28px;height:28px;"><span>Fossils</span>
        </button>
    </div>
</div>

<!-- Travel panel -->
<div id="travel-panel" class="layer-panel">
    <div class="layer-panel-title">TRAVEL</div>
    <div style="display:flex;gap:8px;">
        <button id="btn-wacamps" class="layer-btn" onclick="toggleWACamps()">
            <img src="icons/camps.png" style="width:28px;height:28px;"><span>Camps</span>
        </button>
        <button id="btn-fuel" class="layer-btn" onclick="toggleFuel()">
            <img src="icons/fuel.png" style="width:28px;height:28px;"><span>Fuel</span>
        </button>
        <button id="btn-water" class="layer-btn" onclick="toggleWater()">
            <img src="icons/drinkwater.png" style="width:28px;height:28px;"><span>Water</span>
        </button>
        <button id="btn-dfes" class="layer-btn" onclick="toggleDFES()">
            <img src="icons/dfes/ew-other-fire.svg" style="width:28px;height:28px;"><span>DFES</span>
        </button>
    </div>
</div>

<!-- Panel toggle buttons (bottom right) -->
<div style="position:fixed;bottom:55px;right:10px;z-index:1001;display:flex;flex-direction:row;gap:6px;">
    <button onclick="togglePanel('explore')" style="background:white;border:1px solid #ddd;border-radius:8px;padding:6px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);">
        <img src="icons/explore.png" style="width:32px;height:32px;display:block;">
    </button>
    <button onclick="togglePanel('travel')" style="background:white;border:1px solid #ddd;border-radius:8px;padding:6px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);">
        <img src="icons/wa.png" style="width:32px;height:32px;display:block;">
    </button>
</div>

<!-- Season / GPS bar -->
<div id="season-bar" style="position:fixed;bottom:0;left:0;right:0;padding:6px 12px;font-size:13px;color:#f2f2f2;z-index:999;background:#333;display:flex;align-items:center;justify-content:center;">
    <span id="season-text" style="text-align:center;"></span>
    <span id="gps-indicator" style="display:inline-flex;align-items:center;margin-left:10px;"></span>
</div>

<!-- Pin form -->
<div id="pin-form">
    <h3>Add Pin</h3>
    <input type="hidden" id="edit-index" value="-1">
    <select id="pin-type">
        <option value="camp">Campsite</option>
        <option value="caravan">Caravan Site</option>
        <option value="secret">Secret Spot</option>
        <option value="car">Good Track</option>
        <option value="point">Point of Interest</option>
        <option value="cafe">Cafe / Food</option>
        <option value="water">Water Source</option>
        <option value="dump">Dump Site</option>
        <option value="warn">Warning</option>
    </select>
    <input id="pin-name" type="text" placeholder="Name this spot...">
    <textarea id="pin-note" placeholder="Your notes..."></textarea>
    <input id="pin-address" type="text" placeholder="Address...">
    <input id="pin-phone" type="tel" placeholder="Phone number...">
    <input id="pin-url" type="url" placeholder="Link (optional)... https://...">
    <input id="pin-photo" type="file" accept="image/*" style="width:100%;margin-bottom:8px;font-size:13px;">
    <div id="photo-preview" style="display:none;margin-bottom:8px;">
        <img id="preview-img" style="width:100%;border-radius:8px;max-height:150px;object-fit:cover;">
    </div>
    <select id="pin-stars">
        <option value="1">⭐ 1 star</option>
        <option value="2">⭐⭐ 2 stars</option>
        <option value="3" selected>⭐⭐⭐ 3 stars</option>
        <option value="4">⭐⭐⭐⭐ 4 stars</option>
        <option value="5">⭐⭐⭐⭐⭐ 5 stars</option>
    </select>
    <div class="form-buttons">
        <button id="save-btn" onclick="savePin()">Save</button>
        <button id="cancel-btn" onclick="cancelPin()">Cancel</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
<script>

function toggleDrawer() {
    const drawer = document.getElementById('nav-drawer');
    const isOpen = drawer.style.display === 'block';
    drawer.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) {
        document.getElementById('explore-panel').style.display = 'none';
        document.getElementById('travel-panel').style.display = 'none';
        closeAddPinChooser();
    }
}
function closeDrawer() {
    document.getElementById('nav-drawer').style.display = 'none';
}
function toggleSection(heading) {
    const body = heading.nextElementSibling;
    const isOpen = body.classList.contains('open');
    document.querySelectorAll('.acc-body.open').forEach(function(b) {
        b.classList.remove('open');
        b.previousElementSibling.classList.remove('open');
    });
    if (!isOpen) { body.classList.add('open'); heading.classList.add('open'); }
}
function setMapLayer(layer) {
    if (typeof currentLayer !== 'undefined') map.removeLayer(currentLayer);
    layer.addTo(map);
    currentLayer = layer;
}
function togglePanel(type) {
    const explore = document.getElementById('explore-panel');
    const travel  = document.getElementById('travel-panel');
    closeDrawer();
    closeAddPinChooser();
    if (type === 'explore') {
        travel.style.display = 'none';
        explore.style.display = explore.style.display === 'block' ? 'none' : 'block';
    } else {
        explore.style.display = 'none';
        travel.style.display = travel.style.display === 'block' ? 'none' : 'block';
    }
}
function openNature(type) {
    closeDrawer();
    const taxonMap = { birds: 3, fish: 47178, plants: 47126 };
    let url = 'https://www.inaturalist.org/observations?taxon_id=' + taxonMap[type] + '&place_id=any&view=map';
    if (typeof userMarker !== 'undefined' && userMarker) {
        const ll = userMarker.getLatLng();
        url += '&lat=' + ll.lat.toFixed(4) + '&lng=' + ll.lng.toFixed(4) + '&radius=50';
    }
    window.open(url, '_blank');
}

/* ── Add Pin chooser ── */
function toggleAddPinChooser() {
    const chooser = document.getElementById('add-pin-chooser');
    const isOpen = chooser.style.display === 'block';
    closeDrawer();
    document.getElementById('explore-panel').style.display = 'none';
    document.getElementById('travel-panel').style.display = 'none';
    chooser.style.display = isOpen ? 'none' : 'block';
    if (isOpen) {
        document.getElementById('address-search-row').style.display = 'none';
        document.getElementById('address-results').innerHTML = '';
        document.getElementById('address-input').value = '';
    }
}
function closeAddPinChooser() {
    document.getElementById('add-pin-chooser').style.display = 'none';
    document.getElementById('address-search-row').style.display = 'none';
    document.getElementById('address-results').innerHTML = '';
    document.getElementById('address-input').value = '';
}

function addPinFromGPS() {
    closeAddPinChooser();
    if (typeof userMarker === 'undefined' || !userMarker) {
        alert('GPS not available yet — wait for a fix and try again.');
        return;
    }
    const ll = userMarker.getLatLng();
    pendingLat = ll.lat.toFixed(5);
    pendingLng = ll.lng.toFixed(5);
    document.getElementById('edit-index').value = '-1';
    document.getElementById('pin-form').style.display = 'block';
    document.getElementById('pin-form').querySelector('h3').textContent = 'Add Pin';
    document.getElementById('pin-name').focus();
}

function addPinFromMap() {
    closeAddPinChooser();
    // Long press is already active — just show a brief hint
    const hint = document.createElement('div');
    hint.textContent = 'Hold on the map to place your pin';
    hint.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:white;padding:8px 16px;border-radius:20px;font-size:13px;z-index:2000;pointer-events:none;';
    document.body.appendChild(hint);
    setTimeout(function() { hint.remove(); }, 2500);
}

function toggleAddressSearch() {
    const row = document.getElementById('address-search-row');
    const isOpen = row.style.display === 'block';
    row.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) {
        document.getElementById('address-input').focus();
    }
}

let addressSearchTimer = null;
document.getElementById('address-input').addEventListener('input', function() {
    clearTimeout(addressSearchTimer);
    const q = this.value.trim();
    if (q.length < 3) { document.getElementById('address-results').innerHTML = ''; return; }
    addressSearchTimer = setTimeout(function() { searchAddress(q); }, 400);
});

function searchAddress(q) {
    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&countrycodes=au&limit=5')
        .then(r => r.json())
        .then(results => {
            const container = document.getElementById('address-results');
            container.innerHTML = '';
            if (!results.length) {
                container.innerHTML = '<div style="color:#888;">No results found</div>';
                return;
            }
            results.forEach(function(r) {
                const div = document.createElement('div');
                div.textContent = r.display_name;
                div.addEventListener('click', function() {
                    const lat = parseFloat(r.lat);
                    const lng = parseFloat(r.lon);
                    map.setView([lat, lng], 14);
                    pendingLat = lat.toFixed(5);
                    pendingLng = lng.toFixed(5);
                    closeAddPinChooser();
                    document.getElementById('edit-index').value = '-1';
                    document.getElementById('pin-form').style.display = 'block';
                    document.getElementById('pin-form').querySelector('h3').textContent = 'Add Pin';
                    document.getElementById('pin-name').focus();
                });
                container.appendChild(div);
            });
        })
        .catch(function() {
            document.getElementById('address-results').innerHTML = '<div style="color:#888;">Search failed — check connection</div>';
        });
}

/* ── Close everything when tapping the map ── */
document.getElementById('map').addEventListener('click', function() {
    document.getElementById('explore-panel').style.display = 'none';
    document.getElementById('travel-panel').style.display = 'none';
    closeDrawer();
    closeAddPinChooser();
});

</script>
</body>
</html>
