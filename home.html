<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meeka — Co-Rider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f9f9f9;
        }

        /* Navigation */
        .topnav {
            background-color: #333;
            overflow: hidden;
        }

        .topnav a {
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav a.active {
            background-color: #2d8a4e;
            color: white;
        }

        .topnav .icon {
            display: none;
        }

        .hero {
    width: 100%;
    text-align: center;
    background: #FFFFFF;
}

.hero img {
    width: 100%;
    max-width: 937px;
    height: auto;
}

        /* Links section */
        .links-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 30px 20px;
            flex-wrap: wrap;
            background: white;
        }

        .link-card {
            text-align: center;
            text-decoration: none;
        }

        .link-card img {
            display: block;
            object-fit: contain;
        }

        .link-card:hover {
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #888;
            background: #333;
            color: #ccc;
        }

        /* Mobile */
        @media screen and (max-width: 600px) {
            .topnav a:not(:first-child) { display: none; }
            .topnav a.icon {
                float: right;
                display: block;
            }
            .topnav.responsive { position: relative; }
            .topnav.responsive .icon {
                position: absolute;
                right: 0;
                top: 0;
            }
            .topnav.responsive a {
                float: none;
                display: block;
                text-align: left;
            }
            .links-section {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<div class="topnav" id="myTopnav">
    <a href="home.html" class="active">Home</a>
    <a href="index.html">Meeka Map</a>
    <a href="https://parks.dpaw.wa.gov.au/" target="_blank">WA Parks</a>
    <a href="https://www.emergency.wa.gov.au/" target="_blank">DFES</a>
    <a href="https://www.bom.gov.au/wa/" target="_blank">BOM</a>
    <a href="https://www.wa.gov.au/system/files/2021-06/ALT-map-LocalGovernmentAuthorityBoundaries_A4.pdf" target="_blank">LGA Map</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
        <i class="fa fa-bars"></i>
    </a>
</div>

<!-- Hero Image -->
<div class="hero">
    <img src="images/ach.jpg" alt="Meeka — Co-Rider">
</div>

<!-- Quick Links -->
<div class="links-section">
    <a href="https://www.emergency.wa.gov.au/" target="_blank" class="link-card">
        <img src="images/dfes.png" width="250" height="100" alt="DFES Emergency WA">
    </a>
    <a href="https://parks.dpaw.wa.gov.au/" target="_blank" class="link-card">
        <img src="images/pks.jpg" width="250" height="120" alt="WA Parks">
    </a>
    <a href="https://www.bom.gov.au/wa/" target="_blank" class="link-card">
        <img src="images/bom.jpg" width="300" height="200" alt="Bureau of Meteorology">
    </a>
</div>

<!-- Footer -->
<div class="footer">
    🌙 Meeka — Co-Rider · Noongar Country · WA
</div>

<script>
function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
        x.className += " responsive";
    } else {
        x.className = "topnav";
    }
}
</script>

</body>
</html>
