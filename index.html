<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeka</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: calc(100vh - 32px); width: 100%; margin-top: 32px; }
    #pin-form {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        border-radius: 12px;
        padding: 16px;
        width: 300px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        z-index: 1000;
    }
    #pin-form h3 { margin: 0 0 12px; font-size: 15px; }
    #pin-form select, #pin-form input, #pin-form textarea {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
        box-sizing: border-box;
    }
    #pin-form textarea { height: 60px; resize: none; }
    .form-buttons { display: flex; gap: 8px; }
    .form-buttons button {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        cursor: pointer;
    }
    #save-btn { background: #2d8a4e; color: white; }
    #cancel-btn { background: #eee; color: #333; }
    .emoji-icon { background: none; border: none; }
    </style>
</head>
<body>
    <!-- Season bar at top of page -->
    <div id="map"></div>
    <div id="season-bar" style="position:fixed;top:0;left:0;right:0;padding:6px 12px;font-size:13px;color:black;z-index:1000;background:#000;display:flex;align-items:center;justify-content:center;">
    <span id="season-text" style="flex:1;text-align:center;"></span>
    <img src="logo.png" style="height:100px;opacity:0.85;">
</div>
<!-- PINS -->
    <div id="pin-form">
    <h3>📍 Add pin</h3>
    <input type="hidden" id="edit-index" value="-1">
    <select id="pin-type">
        <option value="camp">⛺ Campsite</option>
        <option value="caravan">🚐 Caravan Site</option>
        <option value="secret">🌿 Secret Spot</option>
        <option value="car">🚗 Good Track</option>
        <option value="point">📍 Point of Interest</option>
        <option value="cafe">☕ Cafe / Food</option>
        <option value="water">💧 Water Source</option>
        <option value="dump">🗑️ Dump Site</option>
        <option value="warn">⚠️ Warning</option>
        
        
    </select>
    <input id="pin-name" type="text" placeholder="Name this spot...">
    <textarea id="pin-note" placeholder="Your notes..."></textarea>
    <input id="pin-url" type="url" placeholder="Link (optional)... https://...">
    <select id="pin-stars">
        <option value="1">⭐ 1 star</option>
        <option value="2">⭐⭐ 2 stars</option>
        <option value="3" selected>⭐⭐⭐ 3 stars</option>
        <option value="4">⭐⭐⭐⭐ 4 stars</option>
        <option value="5">⭐⭐⭐⭐⭐ 5 stars</option>
    </select>
    <div class="form-buttons">
        <button id="save-btn" onclick="savePin()">Save</button>
        <button id="cancel-btn" onclick="cancelPin()">Cancel</button>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
